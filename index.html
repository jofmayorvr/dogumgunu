<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun!</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf2f8;
            --primary-pink: #ec4899;
            --soft-pink: #fbcfe8;
            --cream-pink: #fdf2f8;
            --cream: #ffffff;
            --text-color: #1f2937;
            --letter-paper: #fff5f9;
            --heart-color: #f43f5e;
            --envelope-border: #f9a8d4;
            --seal-color: #e11d48;
            --gold: #fde047;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(var(--soft-pink) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: var(--text-color);
        }

        .scene {
            position: relative;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #title {
            color: var(--primary-pink);
            transition: 0.8s ease-in-out;
            margin-bottom: 50px;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(236, 72, 153, 0.2);
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 1;
            z-index: 5;
            pointer-events: none;
            width: 100%;
        }

        #title.hide-text { 
            opacity: 0; 
            transform: translate(-50%, -20px);
        }

        /* --- 🎂 SÜSLÜ PASTA --- */
        .cake {
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            margin-top: 60px; /* Yaş yazısı sığsın diye biraz aşağı aldık */
        }

        .cake:hover {
            transform: scale(1.05) translateY(-10px);
            filter: drop-shadow(0 15px 25px rgba(236, 72, 153, 0.4));
        }

        .layer {
            position: relative;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 
                inset 0 -10px 15px rgba(0,0,0,0.15), 
                inset 0 5px 10px rgba(255,255,255,0.6), 
                0 5px 10px rgba(0,0,0,0.1);
        }

        /* Yumuşak Krema Görünümü */
        .layer::after {
            content: "";
            position: absolute;
            top: -2px; left: 0; width: 100%; height: 25px;
            background-color: var(--cream);
            border-radius: 20px 20px 10px 10px;
            box-shadow: 0 4px 5px rgba(0,0,0,0.05);
            background-image: linear-gradient(to bottom, #fff, #f8f9fa);
        }

        /* Katman Arası Krema Sıkmaları (Piping) */
        .icing-border {
            position: absolute;
            bottom: -8px; left: 0; width: 100%; height: 16px;
            background-image: radial-gradient(circle, var(--cream) 50%, transparent 55%);
            background-size: 22px 22px;
            background-repeat: repeat-x;
            z-index: 5;
            filter: drop-shadow(0 3px 2px rgba(0,0,0,0.1));
        }

        /* Renk Geçişli Katmanlar */
        .layer-top { width: 140px; height: 75px; background: linear-gradient(to right, #f9a8d4, #fbcfe8, #f9a8d4); z-index: 3; }
        .layer-middle { width: 190px; height: 85px; background: linear-gradient(to right, #f472b6, #f9a8d4, #f472b6); margin-top: -15px; z-index: 2; }
        .layer-bottom { width: 240px; height: 95px; background: linear-gradient(to right, #ec4899, #f472b6, #ec4899); margin-top: -15px; z-index: 1; }

        /* Estetik ve Yukarı Alınmış Yaş Rozeti (Cake Topper) */
        .age {
            position: absolute;
            top: -105px; /* Ateşin rahatça görünmesi için bayağı yukarı çektik */
            left: 50%; transform: translateX(-50%);
            color: var(--gold); /* Altın rengi */
            font-family: 'Caveat', cursive; /* El yazısı estetiği */
            font-size: 55px; 
            font-weight: 700;
            line-height: 1;
            /* 3 Boyutlu Cake Topper efekti */
            text-shadow: 
                2px 2px 0px #e11d48, 
                -1px -1px 0px #fff,
                4px 4px 6px rgba(0,0,0,0.2); 
            z-index: 10; 
            animation: floatBadge 3s ease-in-out infinite;
        }

        /* Çizgili Parti Mumu */
        .candle {
            width: 14px; height: 45px; 
            margin: 0 auto; border-radius: 6px; position: relative;
            z-index: 4;
            background: repeating-linear-gradient(-45deg, #fff, #fff 5px, #f472b6 5px, #f472b6 10px);
            box-shadow: inset 0 -5px 5px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Gerçekçi Ateş Efekti */
        .flame {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 30px;
            background: radial-gradient(ellipse at bottom, #fff 10%, #fef08a 40%, #ea580c 80%);
            border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
            box-shadow: 0 0 20px 5px rgba(234, 88, 12, 0.6), 0 0 40px 10px rgba(253, 224, 71, 0.4);
            animation: flicker 0.15s infinite alternate;
        }

        /* --- SÜSLEMELER (Dekorlar) --- */
        .sprinkle {
            position: absolute;
            width: 6px; height: 14px;
            border-radius: 4px;
            z-index: 4;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .star-decor {
            position: absolute;
            color: var(--gold);
            font-size: 16px;
            z-index: 4;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
        }
        .pearl {
            position: absolute;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            z-index: 4;
            box-shadow: inset -2px -2px 3px rgba(0,0,0,0.2), 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* --- 💌 MEKTUP VE ZARF --- */
        .envelope-container {
            position: absolute; display: none; cursor: pointer; perspective: 1500px; z-index: 150;
            width: 340px; height: 230px; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: transform 0.3s ease;
        }
        .envelope-container:hover { transform: translate(-50%, -52%); }
        .envelope {
            position: absolute; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, var(--cream-pink), var(--cream-pink) 20px, #fff 20px, #fff 40px);
            border-radius: 0 0 15px 15px; box-shadow: 0 15px 35px rgba(236, 72, 153, 0.2); border: 3px solid var(--envelope-border); z-index: 10; 
        }
        .envelope-flap {
            position: absolute; top: -3px; left: -3px; width: calc(100% + 6px); height: 120px;
            background: var(--primary-pink); background-image: linear-gradient(135deg, #f472b6, #ec4899);
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%); transform-origin: top; transition: transform 0.8s ease; z-index: 11; 
            border-radius: 15px 15px 0 0; border-top: 3px solid var(--envelope-border);
        }
        .seal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45px; height: 45px;
            background: var(--seal-color); border-radius: 50%; z-index: 12; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 2px solid #be123c; transition: opacity 0.4s ease;
        }
        .letter {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 90%;
            background: var(--letter-paper); padding: 30px 20px; box-sizing: border-box; transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1; border-radius: 10px; opacity: 0; display: flex; flex-direction: column; align-items: center;
            border: 2px dashed var(--envelope-border); box-shadow: 0 0 10px rgba(0,0,0,0.05);
            background-image: repeating-linear-gradient(transparent, transparent 28px, #fbcfe8 28px, #fbcfe8 29px); background-position: 0 35px;
        }
        .envelope-container.open .letter { opacity: 1; top: -130px; transform: translateX(-50%) scale(1.05) rotate(-2deg); z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .envelope-container.open .envelope-flap { transform: rotateX(180deg); z-index: 5; }
        .envelope-container.open .seal { opacity: 0; pointer-events: none; }
        .letter h2 { color: var(--primary-pink); margin: 0 0 10px 0; font-size: 1.8rem; font-family: 'Caveat', cursive; }
        .letter p { font-size: 1.3rem; line-height: 1.6; color: #4b5563; margin: 5px 0; font-family: 'Caveat', cursive; text-align: center; }
        .letter-heart { color: var(--heart-color); font-size: 28px; margin-bottom: 5px; animation: floatBadge 1.5s infinite; }
        .hide-cake { transform: scale(0) translateY(50px); opacity: 0; pointer-events: none; }
        .show-envelope { display: block !important; animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- ✨ ANİMASYONLAR --- */
        @keyframes flicker { from { opacity: 0.8; transform: translateX(-50%) scale(0.95) skewX(-2deg); } to { opacity: 1; transform: translateX(-50%) scale(1.05) skewX(2deg); } }
        @keyframes popIn { from { transform: translate(-50%, -30%) scale(0) rotate(-10deg); opacity: 0; } to { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; } }
        @keyframes floatBadge { 0% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-6px); } 100% { transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>

    <div class="scene">
        <h1 id="title">Mutlu Yıllar Canım Kardeşim! 🎉</h1>

        <div class="cake" id="cake" onclick="explodeCake()">
            <div class="age">15</div>
            <div class="candle"><div class="flame"></div></div>
            
            <div class="layer layer-top">
                <div class="icing-border"></div>
                <div class="sprinkle" style="top: 30px; left: 20px; transform: rotate(45deg); background: var(--gold);"></div>
                <div class="sprinkle" style="top: 45px; right: 25px; transform: rotate(-30deg); background: white;"></div>
                <div class="star-decor" style="top: 25px; left: 80px;">★</div>
            </div>
            
            <div class="layer layer-middle">
                <div class="icing-border"></div>
                <div class="pearl" style="top: 35px; left: 30px;"></div>
                <div class="pearl" style="top: 55px; left: 80px;"></div>
                <div class="pearl" style="top: 40px; right: 40px;"></div>
                <div class="sprinkle" style="top: 50px; left: 50px; transform: rotate(15deg); background: var(--gold);"></div>
                <div class="star-decor" style="top: 60px; right: 70px;">★</div>
            </div>
            
            <div class="layer layer-bottom">
                <div class="icing-border"></div>
                <div class="sprinkle" style="top: 40px; left: 40px; transform: rotate(70deg); background: white;"></div>
                <div class="sprinkle" style="top: 65px; left: 100px; transform: rotate(-20deg); background: var(--gold);"></div>
                <div class="sprinkle" style="top: 50px; right: 60px; transform: rotate(45deg); background: white;"></div>
                <div class="star-decor" style="top: 45px; left: 150px;">★</div>
                <div class="pearl" style="top: 70px; right: 90px;"></div>
                <div class="pearl" style="top: 55px; left: 70px;"></div>
            </div>
        </div>

        <div class="envelope-container" id="envelopeContainer" onclick="openLetter()">
            <div class="envelope-flap"></div>
            <div class="seal">❤</div>
            <div class="envelope"></div>
            <div class="letter" id="letter">
                <div class="letter-heart">💖</div>
                <h2>Canım Kardeşim</h2>
                <p>Bugün senin en özel günün! 🌟</p>
                <p>Yeni yaşın sana tüm güzellikleri getirsin.<br>Seni çok seviyorum!</p>
                <p>İyi ki varsın! 😘</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function explodeCake() {
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ec4899', '#fbcfe8', '#ffffff', '#fde047']
            });

            document.getElementById('cake').classList.add('hide-cake');
            document.getElementById('title').classList.add('hide-text');
            
            setTimeout(() => {
                document.getElementById('envelopeContainer').classList.add('show-envelope');
            }, 500);
        }

        function openLetter() {
            const container = document.getElementById('envelopeContainer');
            if (!container.classList.contains('open')) {
                container.classList.add('open');
                
                setTimeout(() => {
                    confetti({
                        particleCount: 80,
                        spread: 360,
                        startVelocity: 30,
                        origin: { y: 0.4 },
                        colors: ['#f472b6', '#f9a8d4', '#e11d48']
                    });
                }, 500);
            }
        }
    </script>
</body>
</html>
